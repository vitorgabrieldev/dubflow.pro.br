deploy_homologacao:
  stage: deploy_homologacao
  only:
    - homologation
  image: ubuntu
  before_script:
    - apt update
    - apt install -y sshpass
  script:
    - export SSHPASS="$SSH_PASS_HOMOLOG"
    # Upload compressed file
    - sshpass -e scp -o StrictHostKeyChecking=no build.tar.gz $SSH_USER_HOMOLOG@$SSH_HOST_HOMOLOG:$FOLDER_HOMOLOG
    # Uncompress
    - sshpass -e ssh -o StrictHostKeyChecking=no $SSH_USER_HOMOLOG@$SSH_HOST_HOMOLOG "cd $FOLDER_HOMOLOG && tar -xf build.tar.gz --strip-components=1; rm -rf build.tar.gz"