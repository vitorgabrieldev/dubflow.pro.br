services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dubflow-api
    ports:
      - "3030:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:3030
      FRONTEND_URL: http://localhost:3031
      APP_FRONTEND_URL: http://localhost:3031
      APP_KEY: ${APP_KEY:-base64:90hkmFvVklU1R0xpe20eqIwIZlbd9+3u16fKKtrDMYw=}
      JWT_SECRET: ${JWT_SECRET:-4f4859cd8ca7099b18e1dfc14495de19dfa85facd32ef4e2ca914c6f9ade6bd6}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dubflow
      DB_USERNAME: dubflow
      DB_PASSWORD: dubflow
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
      RUN_MIGRATIONS: "true"
      PORT: 8000
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: dubflow-frontend
    ports:
      - "3031:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost:3030/api/v1
      INTERNAL_API_URL: http://api:8000/api/v1
      NEXT_TELEMETRY_DISABLED: "1"
    depends_on:
      - api

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dubflow-worker
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120"]
    healthcheck:
      disable: true
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:3030
      FRONTEND_URL: http://localhost:3031
      APP_FRONTEND_URL: http://localhost:3031
      APP_KEY: ${APP_KEY:-base64:90hkmFvVklU1R0xpe20eqIwIZlbd9+3u16fKKtrDMYw=}
      JWT_SECRET: ${JWT_SECRET:-4f4859cd8ca7099b18e1dfc14495de19dfa85facd32ef4e2ca914c6f9ade6bd6}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dubflow
      DB_USERNAME: dubflow
      DB_PASSWORD: dubflow
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
      RUN_MIGRATIONS: "false"
      PORT: 8000
    depends_on:
      - mysql
      - redis

  mysql:
    image: mariadb:11
    container_name: dubflow-mysql
    environment:
      MYSQL_DATABASE: dubflow
      MYSQL_USER: dubflow
      MYSQL_PASSWORD: dubflow
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: dubflow-redis
volumes:
  mysql_data:
