services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dubflow-api
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dubflow
      DB_USERNAME: dubflow
      DB_PASSWORD: dubflow
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
      RUN_MIGRATIONS: "true"
      PORT: 8000
    depends_on:
      - mysql
      - redis

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dubflow-worker
    command: ["php", "artisan", "queue:work", "--sleep=1", "--tries=3", "--timeout=120"]
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      FRONTEND_URL: http://localhost:3000
      APP_KEY: ${APP_KEY:-base64:CHANGE_ME}
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME}
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dubflow
      DB_USERNAME: dubflow
      DB_PASSWORD: dubflow
      CACHE_STORE: database
      QUEUE_CONNECTION: database
      SESSION_DRIVER: database
      FILESYSTEM_DISK: public
      RUN_MIGRATIONS: "false"
      PORT: 8000
    depends_on:
      - mysql
      - redis

  mysql:
    image: mariadb:11
    container_name: dubflow-mysql
    environment:
      MYSQL_DATABASE: dubflow
      MYSQL_USER: dubflow
      MYSQL_PASSWORD: dubflow
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    container_name: dubflow-redis
    ports:
      - "6379:6379"

volumes:
  mysql_data:
