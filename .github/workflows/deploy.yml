name: Deploy

on:
  workflow_dispatch:
    inputs:
      deploy_ref:
        description: "Git ref para deploy (branch, tag ou SHA)"
        required: true
        default: "main"
      target:
        description: "Ambiente alvo"
        required: true
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.target }}
  cancel-in-progress: false

jobs:
  quality-gates:
    name: Quality Gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          tools: composer:v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        run: |
          composer install --no-interaction --prefer-dist
          npm --prefix frontend ci
      - name: Run backend tests
        run: php artisan test
      - name: Run frontend lint + build
        run: |
          npm --prefix frontend run lint
          npm --prefix frontend run build
      - name: Install Playwright browser
        run: npx --prefix frontend playwright install --with-deps chromium
      - name: Run frontend e2e smoke
        run: npm --prefix frontend run test:e2e

  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    needs: quality-gates
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: Delay before backend deploy
        run: sleep 60

      - name: Deploy backend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            export DEPLOY_REF="${{ github.event.inputs.deploy_ref }}"
            export APP_DIR="${{ secrets.REPO_DIR }}"
            bash "${{ secrets.REPO_DIR }}/deploy/backend.sh"

  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    environment: ${{ github.event.inputs.target }}
    steps:
      - name: Delay before frontend deploy
        run: sleep 60

      - name: Deploy frontend via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script_stop: true
          script: |
            export DEPLOY_REF="${{ github.event.inputs.deploy_ref }}"
            export REPO_DIR="${{ secrets.REPO_DIR }}"
            export FRONTEND_DIR="${{ secrets.FRONTEND_DIR }}"
            export PM2_APP="${{ secrets.FRONTEND_PM2_APP }}"
            bash "${{ secrets.REPO_DIR }}/deploy/frontend.sh"

  smoke:
    name: Smoke Test
    runs-on: ubuntu-latest
    needs: deploy-frontend
    steps:
      - name: Check health endpoint
        run: |
          set -e
          curl -fsS "${{ secrets.SMOKE_HEALTH_URL }}"
          curl -fsS "${{ secrets.SMOKE_FRONTEND_URL }}"
